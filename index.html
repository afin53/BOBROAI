<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOBROAI - Офіційний ШІ</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --chat-bg: #2a2a32;
            --accent-color: #ff9f43;
            --text-color: #f5f5f5;
        }

        body.vibe-mode {
            --bg-color: #0f0c29;
            --chat-bg: #1a1a2e;
            --accent-color: #6c5ce7;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; transition: all 0.5s ease; }
        
        .chat-container { width: 90%; max-width: 500px; height: 70vh; background-color: var(--chat-bg); border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow: hidden; border: 2px solid var(--accent-color); }
        .chat-header { background-color: var(--accent-color); color: #000; padding: 15px; text-align: center; font-weight: bold; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 75%; padding: 10px 15px; border-radius: 12px; }
        .user-msg { background-color: var(--accent-color); color: #000; align-self: flex-end; }
        .bot-msg { background-color: #3e3e4a; color: var(--text-color); align-self: flex-start; }
        
        /* Поле введення */
        .chat-input-area { display: flex; padding: 10px; background-color: #1a1a20; gap: 10px; }
        input[type="text"] { flex: 1; background-color: #2a2a32; border: 1px solid #444; padding: 12px; color: #fff; border-radius: 8px; outline: none; }
        input[type="text"]:focus { border-color: var(--accent-color); }
        button { background-color: var(--accent-color); border: none; color: #000; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        #music-btn { position: fixed; bottom: 20px; left: 20px; padding: 15px; background: var(--accent-color); border: none; border-radius: 50%; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

    <h1 style="color: var(--accent-color);">🦫 BOBROAI v5.3</h1>

    <div class="chat-container">
        <div class="chat-header">НЕЙРО-МОЗОК ЗАПУЩЕНО</div>
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-msg">я бобр та мені дали телепон як у тебе справи у мене бобро-брито</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Напиши бобру..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Надіслати</button>
        </div>
    </div>

    <button id="music-btn" onclick="toggleMusic()">🎵</button>
    <audio id="vibe-audio" loop>
        <source src="sound.mp3" type="audio/mpeg">
    </audio>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzl92owUoDxMhfV3WMHo0PXl9nj976xOMzdKtDONFzbjraO6eloeIdVLv8sYyXeylmd/exec';
        const audio = document.getElementById('vibe-audio');
        
        function toggleMusic() {
            if (audio.paused) { audio.play(); document.body.classList.add('vibe-mode'); }
            else { audio.pause(); document.body.classList.remove('vibe-mode'); }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            // Додаємо повідомлення юзера
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message user-msg';
            msgDiv.innerText = text;
            document.getElementById('chatMessages').appendChild(msgDiv);
            input.value = '';

            // Додаємо повідомлення бота (заглушка)
            const botMsgDiv = document.createElement('div');
            botMsgDiv.className = 'message bot-msg';
            botMsgDiv.innerText = 'Бобер думає...';
            document.getElementById('chatMessages').appendChild(botMsgDiv);

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Спробуй це, якщо буде помилка CORS
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ message: text })
                });
                botMsgDiv.innerText = "Бобер відповів (якщо налаштував скрипт)";
            } catch (e) {
                botMsgDiv.innerText = "Помилка зв'язку з Бобром.";
            }
        }
    </script>
</body>
</html>
