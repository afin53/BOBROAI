<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOBROAI - Офіційний ШІ</title>
    <style>
        :root {
            --bg-color: #121216;
            --chat-bg: #1e1e24;
            --accent-color: #ff9f43;
            --accent-glow: rgba(255, 159, 67, 0.4);
            --text-color: #f5f5f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d0d12, #1a1a24);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Стилізація скроллбара */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--chat-bg); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

        .chat-container {
            width: 90%;
            max-width: 500px;
            height: 70vh;
            background-color: var(--chat-bg);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 20px rgba(255, 159, 67, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 159, 67, 0.2);
        }

        .chat-header {
            background: linear-gradient(90deg, #ff9f43, #ff7b00);
            color: #111;
            padding: 18px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            background: linear-gradient(135deg, var(--accent-color), #ff7b00);
            color: #111;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px var(--accent-glow);
            font-weight: 500;
        }

        .bot-msg {
            background-color: #2c2c36;
            color: var(--text-color);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #3a3a46;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            background-color: #15151a;
            gap: 12px;
            border-top: 1px solid #2a2a32;
        }

        input[type="text"] {
            flex: 1;
            background-color: #22222a;
            border: 1px solid #444;
            padding: 14px;
            color: #fff;
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-glow);
            background-color: #2a2a32;
        }

        button {
            background-color: var(--accent-color);
            border: none;
            color: #111;
            padding: 0 24px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        button:hover {
            background-color: #ffb169;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px var(--accent-glow);
        }

        button:active {
            transform: translateY(0);
        }

        /* Кнопка музики */
        #music-btn {
            position: fixed;
            bottom: 25px;
            left: 25px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-color), #ff7b00);
            border: none;
            color: #111;
            font-size: 26px;
            cursor: pointer;
            box-shadow: 0 6px 20px var(--accent-glow);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: all 0.3s ease;
        }

        #music-btn:hover {
            transform: scale(1.1) rotate(5deg);
        }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 10px; color: var(--accent-color); text-shadow: 0 2px 10px var(--accent-glow);">🦫 BOBROAI v6.2 (pre-release)</h1>
    <p style="margin-top: 0; color: #aaa;">Власна нейромережа самонавчання</p>

    <div class="chat-container">
        <div class="chat-header">БОБЕР</div>
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-msg">я бобр та мені дали телепон як у тебе справи у мене бобро-брито</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Напиши бобру..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Надіслати</button>
        </div>
    </div>

    <button id="music-btn" onclick="toggleMusic()">🎵</button>
    <audio id="vibe-audio" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbznn-bgRa9yvMQhsDNSntlfeBBipkiP8GAHJOSB5Q7CH7kMtMNZyv8nqh_p_U3l1By0/exec';
        const audio = document.getElementById('vibe-audio');
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                document.getElementById('music-btn').innerText = '🔊';
            } else {
                audio.pause();
                document.getElementById('music-btn').innerText = '🎵';
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            const id = 'msg-' + Math.random().toString(36).substr(2, 9);
            msgDiv.id = id;
            msgDiv.classList.add('message', className);
            msgDiv.innerText = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return id;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user-msg');
            userInput.value = '';

            const botMessageId = appendMessage('Бобер думає...', 'bot-msg');

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                document.getElementById(botMessageId).innerText = data.response;
            } catch (error) {
                document.getElementById(botMessageId).innerText = "Мій мозок залагав, але слова я твої схоже вивчив! Спробуй ще раз.";
                console.error(error);
            }
        }
    </script>
</body>
</html>
