<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOBROAI - Офіційний ШІ</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --chat-bg: #2a2a32;
            --accent-color: #ff9f43;
            --text-color: #f5f5f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .chat-container {
            width: 90%;
            max-width: 500px;
            height: 70vh;
            background-color: var(--chat-bg);
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 2px solid var(--accent-color);
        }

        .chat-header {
            background-color: var(--accent-color);
            color: #000;
            padding: 15px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 12px;
            line-height: 1.4;
        }

        .user-msg {
            background-color: var(--accent-color);
            color: #000;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .bot-msg {
            background-color: #3e3e4a;
            color: var(--text-color);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .chat-input-area {
            display: flex;
            padding: 10px;
            background-color: #1a1a20;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background-color: #2a2a32;
            border: 1px solid #444;
            padding: 12px;
            color: #fff;
            border-radius: 8px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            border: none;
            color: #000;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background-color: #e08b34;
        }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 10px; color: var(--accent-color);">🦫 BOBROAI v1.0</h1>
    <p style="margin-top: 0; color: #aaa;">Офіційний ШІ з мізками в Google Sheets</p>

    <div class="chat-container">
        <div class="chat-header">МІЗОК АКТИВОВАНО</div>
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-msg">Привіт! Я BOBROAI. Запитай мене про щось, і я збережу це у свій мозок!</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Напиши бобру..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Надіслати</button>
        </div>
    </div>

    <script>
        // Твоє офіційне посилання на Google Apps Script мізок
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzv69PueuMUYu5shQUZEahMe1zXIrxdisi-S9DnJAQSx6J5eXVyKCECkx5XfrH5Kgr7/exec';

        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Відображаємо повідомлення користувача
            appendMessage(text, 'user-msg');
            userInput.value = '';

            // Створюємо повідомлення "думання"
            const typingId = appendMessage('Бобер думає...', 'bot-msg');

            try {
                // Відправляємо дані методом POST через текстову форму, щоб уникнути CORS блокування тексту відповіді
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8'
                    },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                
                // Оновлюємо текст "думання" на реальну відповідь від BOBROAI
                document.getElementById(typingId).innerText = data.response;
                
            } catch (error) {
                document.getElementById(typingId).innerText = "Помилка зв'язку з базою знань. Але запит міг записатися!";
                console.error(error);
            }
        }

        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            const id = 'msg-' + Date.now();
            msgDiv.id = id;
            msgDiv.classList.add('message', className);
            msgDiv.innerText = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return id;
        }
    </script>
</body>
</html>
